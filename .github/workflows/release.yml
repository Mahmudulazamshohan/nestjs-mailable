name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPMTOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPMTOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GITHUBTOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
      - name: Setup Yarn
        run: npm install -g yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Verify npm publish access
        run: |
          set -euo pipefail
          NPM_USER="$(npm whoami --registry=https://registry.npmjs.org/)"
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          echo "Authenticated npm user: ${NPM_USER}"
          if npm view "${PACKAGE_NAME}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            MAINTAINERS_JSON="$(npm view "${PACKAGE_NAME}" maintainers --json --registry=https://registry.npmjs.org/)"
            node -e '
              const maintainers = JSON.parse(process.argv[1]);
              const npmUser = process.argv[2];
              const packageName = process.argv[3];
              const entries = Array.isArray(maintainers) ? maintainers : [maintainers];
              const usernames = entries
                .map((entry) => (typeof entry === "string" ? entry.split(" <")[0] : entry?.name))
                .filter(Boolean);
              if (!usernames.includes(npmUser)) {
                console.error(`npm user "${npmUser}" is not a maintainer of ${packageName}.`);
                console.error(`Maintainers: ${usernames.join(", ") || "(none found)"}`);
                process.exit(1);
              }
            ' "${MAINTAINERS_JSON}" "${NPM_USER}" "${PACKAGE_NAME}"
          else
            echo "Package ${PACKAGE_NAME} is not published yet; skipping maintainer check."
          fi
      - name: Lint code
        run: yarn run lint:core
      - name: Type check
        run: yarn run typecheck
      - name: Run tests
        run: yarn run test:core
      - name: Build package
        run: yarn run build:core
      - name: Run semantic-release
        id: semantic
        run: npx semantic-release --debug
